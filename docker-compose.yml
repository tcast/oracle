services:
  postgres:
    image: postgres:16-alpine
    container_name: whisper-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whisper
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: whisper-backend
    ports:
      - "3021:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=whisper
      - DB_SSL=false
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/whisper
      - JWT_SECRET=1ac86a81f6082c1fe8394a6af49cd7ad85263d47b48d8af30db1e78b5de91d9c
      - FIVESIM_API_KEY=eyJhbGciOiJSUzUxMiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzIzOTg2NDksImlhdCI6MTc0MDg2MjY0OSwicmF5IjoiZDgxODJiZTU0NTc5MjMyMWRmNDhiODY3YzQ4M2RkZmEiLCJzdWIiOjMwNjQ5OTZ9.FjGc--NXbuM_RSbceN4TqvR1oJzx8UiGjb5rFbiuGlgT9FOxB_QHdS_K27xiUZOhDP12QNFOaQDNDcrlKXrTA2pE1igK8yVPssR9G1x398MVCW-VsXahKL3RpCg-kXCRKpSahO5xTe-VSElVm6dTbDc6VaCLMoGI7bjd7-9ajgM-bXqgUxu7ScELlgoDEXUxBSr5vjqRWJodl-GGaTxp1n-wl1TU1dEdYPG1KaDokv35FzAM2TZnvDxgZWoaigxAB4GFrDpXH3_jJQyblOxn29p-fj-57fimRD2_Vj-bQqdvXytDTI9X67e3A427UzegvyhAlhMT1WWBzmYfwRVgDA
      - TWOCAPTCHA_API_KEY=acde364c7433b278656840ece205f91a
      - CAPSOLVER_API_KEY=CAP-B642BF591035A4C8A60DD06C5E89E8636EF5E64315ABEE6171545854C808D5C7
    volumes:
      - ./backend/uploads:/app/uploads
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: whisper-frontend
    ports:
      - "3020:3020"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3020"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  uploads:
    driver: local